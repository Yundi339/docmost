[program:docmost]
command=/usr/local/bin/aio-start-app.sh
user=node
directory=/app
priority=30
autostart=true
autorestart=true
startsecs=10
stopsignal=TERM
stopwaitsecs=30
environment=PATH="/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin",HOME="/home/node"
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
