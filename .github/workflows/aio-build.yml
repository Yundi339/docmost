name: AIO (All-in-One) Image

# Manually dispatch to build a single-container image bundling Docmost +
# PostgreSQL + Redis. The workflow can target any branch.

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch / tag / SHA to build (default: current ref)'
        required: false
        default: ''
      tag:
        description: 'Image tag suffix (default: branch name)'
        required: false
        default: ''
      push:
        description: 'Push image to GHCR (otherwise only artifact)'
        type: boolean
        required: false
        default: true

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build AIO image
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            suffix: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            suffix: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve image tag
        id: meta
        run: |
          raw_tag="${{ inputs.tag }}"
          if [[ -z "$raw_tag" ]]; then
            raw_tag="${{ inputs.ref || github.ref_name }}"
          fi
          # Sanitize for docker tag (replace / and other unsafe chars with -)
          safe_tag=$(echo "$raw_tag" | sed -E 's#[^a-zA-Z0-9._-]+#-#g' | sed -E 's/^-+|-+$//g')
          owner_lc=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "tag=$safe_tag" >> "$GITHUB_OUTPUT"
          echo "image=ghcr.io/${owner_lc}/docmost-aio" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        if: ${{ inputs.push }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build (and optionally push) image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/aio/Dockerfile
          platforms: ${{ matrix.platform }}
          push: ${{ inputs.push }}
          tags: |
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.tag }}-${{ matrix.suffix }}
          outputs: |
            type=docker,dest=docmost-aio-${{ matrix.suffix }}.tar
          cache-from: type=gha,scope=aio-${{ matrix.suffix }}
          cache-to: type=gha,scope=aio-${{ matrix.suffix }},mode=max

      - name: Compress artifact
        run: gzip docmost-aio-${{ matrix.suffix }}.tar

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docmost-aio-${{ steps.meta.outputs.tag }}-${{ matrix.suffix }}
          path: docmost-aio-${{ matrix.suffix }}.tar.gz
          if-no-files-found: error

      - name: Upload runner script
        uses: actions/upload-artifact@v4
        with:
          name: docmost-aio-runner-${{ steps.meta.outputs.tag }}-${{ matrix.suffix }}
          path: scripts/docmost-aio-run.sh
          if-no-files-found: error

  manifest:
    name: Push multi-arch manifest
    needs: build
    if: ${{ inputs.push }}
    runs-on: ubuntu-latest
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image tag
        id: meta
        run: |
          raw_tag="${{ inputs.tag }}"
          if [[ -z "$raw_tag" ]]; then
            raw_tag="${{ inputs.ref || github.ref_name }}"
          fi
          safe_tag=$(echo "$raw_tag" | sed -E 's#[^a-zA-Z0-9._-]+#-#g' | sed -E 's/^-+|-+$//g')
          owner_lc=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "tag=$safe_tag" >> "$GITHUB_OUTPUT"
          echo "image=ghcr.io/${owner_lc}/docmost-aio" >> "$GITHUB_OUTPUT"

      - name: Create & push multi-arch manifest
        run: |
          set -euo pipefail
          IMG="${{ steps.meta.outputs.image }}"
          TAG="${{ steps.meta.outputs.tag }}"
          docker buildx imagetools create \
            -t "${IMG}:${TAG}" \
            "${IMG}:${TAG}-amd64" \
            "${IMG}:${TAG}-arm64"
