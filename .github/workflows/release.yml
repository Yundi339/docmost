name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v0.25.3)'
        required: true

permissions:
  contents: write

env:
  VERSION: ${{ inputs.version || github.ref_name }}

jobs:
  build:
    strategy:
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            suffix: amd64
            variant: standard
            dockerfile: Dockerfile
            image: docmost/docmost
            artifact_prefix: docmost
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            suffix: arm64
            variant: standard
            dockerfile: Dockerfile
            image: docmost/docmost
            artifact_prefix: docmost
          - platform: linux/amd64
            runner: ubuntu-latest
            suffix: amd64
            variant: aio
            dockerfile: docker/aio/Dockerfile
            image: docmost/docmost-aio
            artifact_prefix: docmost-aio
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            suffix: arm64
            variant: aio
            dockerfile: docker/aio/Dockerfile
            image: docmost/docmost-aio
            artifact_prefix: docmost-aio
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Strip v prefix
        id: strip-v
        run: echo "version=${VERSION#v}" >> "$GITHUB_OUTPUT"

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: ${{ matrix.platform }}
          push: false
          tags: |
            ${{ matrix.image }}:latest
            ${{ matrix.image }}:${{ steps.strip-v.outputs.version }}
          outputs: type=docker,dest=${{ matrix.artifact_prefix }}-${{ steps.strip-v.outputs.version }}-${{ matrix.suffix }}.docker.tar
          cache-from: type=gha,scope=${{ matrix.variant }}-${{ matrix.suffix }}
          cache-to: type=gha,scope=${{ matrix.variant }}-${{ matrix.suffix }},mode=max

      - name: Compress image
        run: gzip ${{ matrix.artifact_prefix }}-${{ steps.strip-v.outputs.version }}-${{ matrix.suffix }}.docker.tar

      - name: Upload image archive
        uses: actions/upload-artifact@v4
        with:
          name: docker-image-${{ matrix.variant }}-${{ matrix.suffix }}
          path: ${{ matrix.artifact_prefix }}-${{ steps.strip-v.outputs.version }}-${{ matrix.suffix }}.docker.tar.gz
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Strip v prefix
        id: strip-v
        run: echo "version=${VERSION#v}" >> "$GITHUB_OUTPUT"

      - name: Download image archives
        uses: actions/download-artifact@v4
        with:
          pattern: docker-image-*
          path: /tmp/images
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          files: |
            /tmp/images/docmost-${{ steps.strip-v.outputs.version }}-amd64.docker.tar.gz
            /tmp/images/docmost-${{ steps.strip-v.outputs.version }}-arm64.docker.tar.gz
            /tmp/images/docmost-aio-${{ steps.strip-v.outputs.version }}-amd64.docker.tar.gz
            /tmp/images/docmost-aio-${{ steps.strip-v.outputs.version }}-arm64.docker.tar.gz
          draft: true
